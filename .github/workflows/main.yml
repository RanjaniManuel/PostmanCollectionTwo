name: Postman Collection Two

on:
  push:
    branches: [master]
  workflow_dispatch: 
  schedule:
    - cron: '30 2 * * *'


jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
       - name: Checking out the code
         uses: actions/checkout@v4

       - name: Setup Node
         uses: actions/setup-node@v4
         with: 
           node-version: 18

       - name: Install newman
         run: |
           npm install -g newman
           npm install -g newman-reporter-htmlextra
        
       - name: Run Collection
         run: |
           newman run PheonixCollection.postman_collection.json \
             -e QA.postman_environment.json \
             -d TestData.csv \
             -r cli,htmlextra \
             --reporter-htmlextra-export ./newman/index.html
        
       - name: Upload Report
         if: always()
         uses: actions/upload-artifact@v4
         with: 
           name: newman-rtml-report
           path: newman/*.html

        
       - name: Create new page branch
         if: always()
         uses: peaceiris/actions-gh-pages@v4.0.0
         with:
           github_token: ${{ secrets.GITHUB_TOKEN }}
           publish_dir: ./newman
           publish_branch: gh-pages
      
       - name: Send email
         if: always()
         uses: dawidd6/action-send-mail@v11
         with:
           server_address: smtp.gmail.com
           server_port: 465
           username: ${{ secrets.EMAIL_USERNAME }}
           password: ${{ secrets.EMAIL.PASSWORD }}
           subject: Phoenix Inwaranty Flow Test Execution Notification
           to: sebastijeyaranjani@gmail.com
           from: ${{ secrets.EMAIL_USERNAME }}
           body: |
                 Hi,
                 Postman Execution tests have been executed. And the Report has been published and the url
                 https://ranjanimanuel.github.io/PostmanCollectionTwo/
                 
           
           
           
           
         
        

    
      
            
      
     
    
    
  
  
  
    
